name: Daily Rain Check

on:
  schedule:
    # Runs every day at 06:00 UTC (11:30 AM IST)
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  run-app:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/checks/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Rain Alert Script
        env:
          # Securely pass your API keys here
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
        run: python main.py